services:
  postgres:
    image: postgres:15
    container_name: medical-db
    environment:
      POSTGRES_DB: medical_records
      POSTGRES_USER: medical_user
      POSTGRES_PASSWORD: medical_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medical_user -d medical_records"]
      interval: 5s
      timeout: 5s
      retries: 5

  medical-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical-api
    ports:
      - "8080:8080"
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    environment:
      - TZ=UTC
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=medical_records
      - DB_USER=medical_user
      - DB_PASSWORD=medical_pass
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
